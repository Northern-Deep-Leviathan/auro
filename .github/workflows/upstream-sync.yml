name: upstream-sync

on:
  schedule:
    # Run every Saturday at 7:00 PM (19:00 UTC)
    - cron: "0 19 * * 6"
  workflow_dispatch:

jobs:
  sync:
    name: Sync with Upstream
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          opencode-app-id: ${{ vars.OPENCODE_APP_ID }}
          opencode-app-secret: ${{ secrets.OPENCODE_APP_SECRET }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/anomalyco/opencode.git || true
          git remote set-url upstream https://github.com/anomalyco/opencode.git

      - name: Fetch upstream changes
        run: |
          git fetch upstream --tags
          echo "Upstream fetched successfully"

      - name: Update upstream-sync branch
        run: |
          # Check if upstream-sync branch exists locally
          if git show-ref --verify --quiet refs/heads/upstream-sync; then
            git checkout upstream-sync
          else
            # Check if it exists remotely
            if git ls-remote --heads origin upstream-sync | grep upstream-sync; then
              git fetch origin upstream-sync
              git checkout -b upstream-sync origin/upstream-sync
            else
              # Create new branch from upstream/dev or upstream/main
              if git show-ref --verify --quiet refs/remotes/upstream/dev; then
                git checkout -b upstream-sync upstream/dev
              elif git show-ref --verify --quiet refs/remotes/upstream/main; then
                git checkout -b upstream-sync upstream/main
              else
                echo "Error: Could not find upstream/dev or upstream/main"
                exit 1
              fi
            fi
          fi

          # Update upstream-sync to match upstream
          if git show-ref --verify --quiet refs/remotes/upstream/dev; then
            git reset --hard upstream/dev
          elif git show-ref --verify --quiet refs/remotes/upstream/main; then
            git reset --hard upstream/main
          fi

          # Push upstream-sync branch
          git push origin upstream-sync --force-with-lease

      - name: Create sync branch and attempt merge
        id: merge
        run: |
          # Create a new branch for the sync PR
          SYNC_BRANCH="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          echo "sync_branch=$SYNC_BRANCH" >> $GITHUB_OUTPUT

          # Ensure main branch exists and is up to date
          git fetch origin main:main || git fetch origin dev:main || {
            echo "Error: Could not fetch main or dev branch from origin"
            exit 1
          }

          # Checkout main branch
          git checkout main

          # Create new sync branch from main
          git checkout -b $SYNC_BRANCH

          # Register the 'ours' merge driver (.gitattributes already maps .github/** to it)
          git config merge.ours.driver true

          # Attempt to merge upstream-sync without auto-committing
          if git merge upstream-sync --no-ff --no-commit; then
            git commit -m "Merge upstream changes (excluding .github)"
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "Merge successful"
            git push origin $SYNC_BRANCH
          else
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "Merge has conflicts"
            # Save conflict information (excluding .github)
            git status > /tmp/conflict_status.txt
            git diff --name-only --diff-filter=U | grep -v '^\.github/' > /tmp/conflict_files.txt
            # Try to push the branch with conflicts
            if ! git push origin $SYNC_BRANCH 2>/tmp/push_error.txt; then
              echo "Warning: Could not push branch with conflicts"
              cat /tmp/push_error.txt
            fi
          fi

      - name: Create Pull Request
        if: steps.merge.outputs.merge_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="${{ steps.merge.outputs.sync_branch }}"
          gh pr create \
            --base main \
            --head $SYNC_BRANCH \
            --title "Sync upstream changes $(date +%Y-%m-%d)" \
            --body "This PR syncs changes from upstream repository. Automated merge completed successfully." \
            --label "automated,upstream-sync"

      - name: Trigger Copilot for conflict resolution
        if: steps.merge.outputs.merge_status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="${{ steps.merge.outputs.sync_branch }}"

          # Read conflict information
          CONFLICT_FILES=$(cat /tmp/conflict_files.txt || echo 'Unable to list conflict files')
          CONFLICT_STATUS=$(cat /tmp/conflict_status.txt || echo 'Unable to get status')

          # Create issue body
          ISSUE_BODY=$(cat << EOF
          ## Upstream Sync Conflict Resolution Needed

          This is an automated request to resolve merge conflicts in the upstream sync process.

          **Branch:** \`$SYNC_BRANCH\`
          **Target:** \`main\`

          ### Conflicts detected in:
          \`\`\`
          $CONFLICT_FILES
          \`\`\`

          ### Status:
          \`\`\`
          $CONFLICT_STATUS
          \`\`\`

          @copilot Please resolve the merge conflicts in branch \`$SYNC_BRANCH\` and create a pull request to \`main\`.

          Steps:
          1. Checkout the branch \`$SYNC_BRANCH\`
          2. Resolve all merge conflicts
          3. Commit the resolved changes
          4. Create a pull request to merge into \`main\`
          EOF
          )

          gh issue create \
            --title "Resolve upstream sync conflicts for $SYNC_BRANCH" \
            --body "$ISSUE_BODY" \
            --label "copilot,conflict-resolution,upstream-sync"
