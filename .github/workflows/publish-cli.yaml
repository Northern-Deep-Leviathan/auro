name: publish
run-name: "release ${{ inputs.version || inputs.bump || 'patch' }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string
  schedule:
    # Every Wednesday at 03:17 UTC
    - cron: "17 3 * * 3"

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump || 'patch' }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-24.04
    if: github.repository == 'Northern-Deep-Leviathan/auro'
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: check
        name: Check for new commits since last tag
        run: |
          # Manual dispatch always proceeds.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            echo "No prior tag found; treating as changed."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(git rev-list "$last_tag"..HEAD --count)
          echo "Commits since $last_tag: $count"
          if [ "$count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  version:
    needs: changes
    runs-on: ubuntu-24.04
    if: github.repository == 'Northern-Deep-Leviathan/auro' && needs.changes.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Install OpenCode
        if: inputs.bump || inputs.version || github.event_name == 'schedule'
        run: bun i -g opencode-ai

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          AURO_BUMP: ${{ inputs.version && '' || (inputs.bump || 'patch') }}
          AURO_VERSION: ${{ inputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-24.04
    if: github.repository == 'Northern-Deep-Leviathan/auro'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        id: build
        run: |
          bun ./packages/opencode/script/build.ts
        env:
          AURO_VERSION: ${{ needs.version.outputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OPENCODE_PROVIDER_ALLOWLIST: src/provider/china-allowlist.json

      - uses: actions/upload-artifact@v4
        with:
          name: auro-cli
          path: packages/opencode/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup auro git
        id: gitconfig
        uses: ./.github/actions/setup-auro-git
        with:
          auro-app-id: ${{ vars.AURO_APP_ID }}
          auro-app-key: ${{ secrets.AURO_APP_KEY }}

      - uses: actions/download-artifact@v4
        with:
          name: auro-cli
          path: packages/opencode/dist

      - run: |
          bun ./script/publish-release-cli.ts
        env:
          AURO_VERSION: ${{ needs.version.outputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GITHUB_TOKEN: ${{ steps.gitconfig.outputs.token }}
          GH_REPO: ${{ github.repository }}
          NPM_CONFIG_PROVENANCE: false
