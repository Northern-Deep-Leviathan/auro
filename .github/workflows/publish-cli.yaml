name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-24.04
    if: github.repository == 'Northern-Deep-Leviathan/auro'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Install OpenCode
        if: inputs.bump || inputs.version
        run: bun i -g opencode-ai

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          AURO_BUMP: ${{ inputs.bump }}
          AURO_VERSION: ${{ inputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-24.04
    if: github.repository == 'Northern-Deep-Leviathan/auro'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        id: build
        run: |
          bun ./packages/opencode/script/build.ts
        env:
          AURO_VERSION: ${{ needs.version.outputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OPENCODE_PROVIDER_ALLOWLIST: src/provider/china-allowlist.json

      - uses: actions/upload-artifact@v4
        with:
          name: auro-cli
          path: packages/opencode/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup auro git
        id: gitconfig
        uses: ./.github/actions/setup-auro-git
        with:
          auro-app-id: ${{ vars.AURO_APP_ID }}
          auro-app-secret: ${{ secrets.AURO_APP_SECRET }}

      - uses: actions/download-artifact@v4
        with:
          name: auro-cli
          path: packages/opencode/dist

      - name: Cache apt packages (AUR)
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-aur-${{ hashFiles('.github/workflows/publish-cli.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-aur-

      - name: Setup SSH for AUR
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager
          mkdir -p ~/.ssh
          echo "${{ secrets.AURO_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.email "auro@sst.dev"
          git config --global user.name "auro"
          ssh-keyscan -t ed25519,ecdsa,rsa aur.archlinux.org >> ~/.ssh/known_hosts || true

      - run: ./script/publish.ts
        env:
          AURO_VERSION: ${{ needs.version.outputs.version }}
          AURO_RELEASE: ${{ needs.version.outputs.release }}
          GITHUB_TOKEN: ${{ steps.gitconfig.outputs.token }}
          GH_REPO: ${{ github.repository }}
          NPM_CONFIG_PROVENANCE: false
